<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page introuvable — BeLoc</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230A0A0C'/><text y='75' x='8' font-size='72' font-weight='700' font-family='system-ui,sans-serif' fill='%23C9A96E'>B.</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
a{color:inherit;text-decoration:none}
:root{--bg:#0A0A0C;--bg1:#111114;--bdr:rgba(255,255,255,.08);--gold:#C9A96E;--goldd:rgba(201,169,110,.12);--t1:#FAFAFA;--t2:#A1A1AA;--fh:'Space Grotesk',system-ui,sans-serif;--fb:'Inter',system-ui,sans-serif;}
html,body{height:100%}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.code{font-family:var(--fh);font-size:clamp(80px,22vw,140px);font-weight:700;line-height:1;background:linear-gradient(135deg,var(--gold) 0%,rgba(201,169,110,.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.title{font-family:var(--fh);font-weight:700;font-size:clamp(20px,5vw,28px);color:var(--t1);letter-spacing:-.4px;margin-bottom:10px}
.sub{font-family:var(--fb);font-size:14px;color:var(--t2);line-height:1.6;max-width:28ch;margin:0 auto 36px}
.cta-home{display:inline-flex;align-items:center;gap:8px;height:52px;padding:0 28px;background:var(--gold);color:#1C1A15;font-family:var(--fh);font-weight:600;font-size:15px;border-radius:12px;border:none;cursor:pointer;touch-action:manipulation}
.cta-home:active{opacity:.9}
.cta-fleet{display:inline-flex;align-items:center;gap:8px;height:44px;padding:0 20px;background:transparent;color:var(--t2);font-family:var(--fb);font-size:13px;border:1px solid var(--bdr);border-radius:10px;margin-top:10px}
.btns{display:flex;flex-direction:column;align-items:center;gap:0}
.logo{font-family:var(--fh);font-weight:700;font-size:22px;color:#fff;position:fixed;top:20px;left:24px}
.logo span{color:var(--gold)}
  </style>
</head>
<body>
  <a href="index.html" class="logo">BeLoc<span>.</span></a>
  <p class="code">404</p>
  <h1 class="title">Cette page n'existe pas</h1>
  <p class="sub">Le lien que vous avez suivi est peut-être cassé ou la page a été déplacée.</p>
  <div class="btns">
    <a href="index.html" class="cta-home">
      Retour à l'accueil
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
    </a>
    <a href="index.html#fleet" class="cta-fleet">Voir la flotte</a>
  </div>
</body>
</html>
