<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101420"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(59,130,246,0.07)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <!-- Car silhouette - hatchback shape -->
  <g fill="rgba(201,169,110,0.07)">
    <path d="M 80,390 L 115,358 L 165,316 L 240,286 L 320,270 L 480,270 L 570,285 L 635,318 L 690,358 L 720,390 Z"/>
    <path d="M 190,370 L 210,325 L 255,290 L 330,270 L 470,270 L 545,285 L 590,325 L 600,370 Z"/>
  </g>
  <!-- Wheels -->
  <circle cx="215" cy="395" r="52" fill="rgba(10,10,12,0.9)" stroke="rgba(201,169,110,0.2)" stroke-width="3"/>
  <circle cx="215" cy="395" r="34" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="2"/>
  <circle cx="585" cy="395" r="52" fill="rgba(10,10,12,0.9)" stroke="rgba(201,169,110,0.2)" stroke-width="3"/>
  <circle cx="585" cy="395" r="34" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="2"/>
  <!-- Ground shadow -->
  <ellipse cx="400" cy="448" rx="305" ry="12" fill="rgba(0,0,0,0.4)"/>
  <!-- Text -->
  <text x="400" y="175" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="rgba(201,169,110,0.92)" letter-spacing="1">VW Golf 8R</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.28)" letter-spacing="5">350 CH · SPORT · 2025</text>
  <line x1="265" y1="244" x2="535" y2="244" stroke="rgba(201,169,110,0.18)" stroke-width="1"/>
  <text x="400" y="498" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.18)" letter-spacing="2">PHOTO À VENIR</text>
</svg>
