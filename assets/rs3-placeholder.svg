<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1015"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(201,169,110,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#glow)"/>
  <!-- Car silhouette -->
  <g fill="rgba(201,169,110,0.07)">
    <path d="M 75,390 L 110,360 L 160,320 L 230,290 L 310,272 L 490,272 L 580,288 L 650,320 L 700,360 L 725,390 Z"/>
    <path d="M 185,372 L 200,330 L 240,295 L 310,272 L 490,272 L 560,290 L 605,330 L 615,372 Z"/>
  </g>
  <!-- Wheels outline -->
  <circle cx="210" cy="395" r="52" fill="rgba(10,10,12,0.9)" stroke="rgba(201,169,110,0.2)" stroke-width="3"/>
  <circle cx="210" cy="395" r="34" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="2"/>
  <circle cx="590" cy="395" r="52" fill="rgba(10,10,12,0.9)" stroke="rgba(201,169,110,0.2)" stroke-width="3"/>
  <circle cx="590" cy="395" r="34" fill="none" stroke="rgba(201,169,110,0.15)" stroke-width="2"/>
  <!-- Ground shadow -->
  <ellipse cx="400" cy="448" rx="310" ry="12" fill="rgba(0,0,0,0.4)"/>
  <!-- Text -->
  <text x="400" y="175" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="700" fill="rgba(201,169,110,0.92)" letter-spacing="1">Audi RS3</text>
  <text x="400" y="220" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.28)" letter-spacing="5">355 CH · SPORT · 2025</text>
  <line x1="260" y1="244" x2="540" y2="244" stroke="rgba(201,169,110,0.18)" stroke-width="1"/>
  <text x="400" y="498" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.18)" letter-spacing="2">PHOTO À VENIR</text>
</svg>
